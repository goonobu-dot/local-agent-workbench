name: Bug report
description: Report a problem with Local Agent Workbench
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, pane count, and relevant environment variables.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor report
      description: Run ./scripts/doctor.sh --report doctor-report.md and paste the generated report if possible.
      render: markdown
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, tmux version, Codex CLI install path.
